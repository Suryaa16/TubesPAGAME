<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug or Die</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      data-name="vs/editor/editor.main"
      href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css"
    />
  </head>
  <body>
    <!-- Mute Button (global) -->
    <button id="mute-btn" onclick="toggleMute()">🔊</button>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
      <div class="start-logo">DEBUG OR DIE</div>
      <button id="btn-new-game">▶ MULAI PETUALANGAN</button>
      <button id="btn-load">📁 LOAD SAVE</button>
    </div>

    <!-- LOAD SCREEN -->
    <div id="load-screen" class="screen">
      <div id="load-title">LOAD SAVE</div>
      <div id="load-slots">
        <div class="save-slot" id="slot-0">Slot 1 — Kosong</div>
        <div class="save-slot" id="slot-1">Slot 2 — Kosong</div>
        <div class="save-slot" id="slot-2">Slot 3 — Kosong</div>
      </div>
      <button id="btn-back" onclick="switchScreen('start-screen')">
        ← KEMBALI
      </button>
    </div>

    <!-- VN SCREEN -->
    <div id="vn-screen" class="screen">
      <div id="vn-background"></div>
      <div id="vn-episode">DEBUG OR DIE — EPISODE 01</div>
      <div id="vn-character"></div>
      <div id="vn-textbox">
        <div id="vn-name"></div>
        <div id="vn-text"></div>
        <div id="vn-next">[ KLIK UNTUK LANJUT ]</div>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <div id="hud">
        <span id="stage-info">STAGE 1 / 4</span>
        <span id="timer">⏱ 60</span>
        <div id="hud-right">
          <span id="hints">💡 3</span>
        </div>
      </div>
      <div id="stage-title">BOM #1 — SERVER ROOM</div>
      <div id="code-display"></div>
      <div
        id="monaco-container"
        style="
          display: none;
          width: 100%;
          height: 200px;
          border: 1px solid #e94560;
        "
      ></div>
      <div id="bottom-panel">
        <div id="question-text"></div>
        <div id="answer-buttons">
          <button class="answer-btn" id="btn-a"></button>
          <button class="answer-btn" id="btn-b"></button>
          <button class="answer-btn" id="btn-c"></button>
        </div>
        <button
          id="execute-btn"
          style="
            display: none;
            padding: 14px;
            background: #e94560;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 15px;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 4px;
          "
        >
          ▶ EXECUTE / DEFUSE
        </button>
        <div id="feedback-row">
          <div id="feedback"></div>
          <button id="hint-btn">💡 HINT (-10s)</button>
        </div>
      </div>
    </div>

    <!-- GAMEOVER SCREEN -->
    <div id="gameover-screen" class="screen">
      <h1>💥 BOOM!</h1>
      <p id="gameover-msg"></p>
      <button id="restart-btn">COBA LAGI</button>
    </div>

    <!-- WIN SCREEN -->
    <div id="win-screen" class="screen">
      <h1>SISTEM AMAN</h1>
      <p id="win-msg"></p>
      <div id="score-display"></div>
      <button id="play-again-btn">MAIN LAGI</button>
    </div>

    <script src="js/audio.js"></script>
    <script src="data/dialog.js"></script>
    <script src="js/vn.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
    <script>
      var require = {
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  </body>
</html>
